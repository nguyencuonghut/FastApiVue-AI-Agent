services:
  backend-test:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: >
      sh -lc "uv sync &&
      .venv/bin/pytest &&
      .venv/bin/ruff check . &&
      .venv/bin/mypy . &&
      .venv/bin/bandit -c pyproject.toml -s B104 -r app"
    env_file:
      - .env
    environment:
      APP_ENV: test
      APP_DEBUG: "false"
      PYTHONPATH: /app
      POSTGRES_HOST: postgres-test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/app_test
      REDIS_URL: redis://redis-test:6379/0
      SMTP_HOST: mailpit-test
      SMTP_PORT: 1025
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      mailpit-test:
        condition: service_healthy

  frontend-test:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    command: sh -lc "npm install && npm run lint && npm run typecheck && npm run test:unit"

  frontend-e2e:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_PROXY_TARGET: http://backend-e2e:8000
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch("http://127.0.0.1:4173").then((response) => {
            if (!response.ok) process.exit(1);
          }).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend-e2e:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: >
      sh -lc "uv sync &&
      uv run alembic upgrade head &&
      uv run python scripts/seed_auth_rbac.py &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      APP_ENV: test
      APP_DEBUG: "false"
      PYTHONPATH: /app
      POSTGRES_HOST: postgres-test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/app_test
      REDIS_URL: redis://redis-test:6379/0
      SMTP_HOST: mailpit-test
      SMTP_PORT: 1025
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      mailpit-test:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  e2e-test:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: e2e
    command: sh -lc "npm run test:e2e:docker"
    depends_on:
      frontend-e2e:
        condition: service_healthy

  postgres-test:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d app_test
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  minio-test:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - minio_test_data:/data

  redis-test:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_test_data:/data

  mailpit-test:
    image: axllent/mailpit:v1.21
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-test:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: >
      sh -lc "uv sync &&
      uv run arq app.worker.WorkerSettings"
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      mailpit-test:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: test
      APP_DEBUG: "false"
      PYTHONPATH: /app
      POSTGRES_HOST: postgres-test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/app_test
      MINIO_ENDPOINT: minio-test:9000
      REDIS_URL: redis://redis-test:6379/0
      SMTP_HOST: mailpit-test
      SMTP_PORT: 1025
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./backups:/app/backups

volumes:
  postgres_test_data:
  minio_test_data:
  redis_test_data:
  backend_venv:

