services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: >
      sh -lc "uv sync &&
      uv run alembic upgrade head &&
      uv run python scripts/seed_auth_rbac.py &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
      MINIO_ENDPOINT: minio:9000
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./backups:/app/backups

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    command: sh -lc "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_PROXY_TARGET: http://backend:8000
      VITE_APP_NAME: "${VITE_APP_NAME:-FastApiVue}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch("http://127.0.0.1:5173").then((response) => {
            if (!response.ok) process.exit(1);
          }).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d app
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "${MINIO_API_HOST_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-59001}:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: >
      sh -lc "uv sync &&
      uv run arq app.worker.WorkerSettings"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
      MINIO_ENDPOINT: minio:9000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./backups:/app/backups

volumes:
  backend_venv:
  frontend_node_modules:
  postgres_data:
  minio_data:
  redis_data:
