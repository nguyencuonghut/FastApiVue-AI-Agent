services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    env_file:
      - .env.example
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
      MINIO_ENDPOINT: minio:9000
      CORS_ORIGINS: http://127.0.0.1:${PROXY_HOST_PORT:-8080},http://localhost:${PROXY_HOST_PORT:-8080}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: /api/v1
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  reverse-proxy:
    image: nginx:1.28-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PROXY_HOST_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d app
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - minio_prod_data:/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_prod_data:/data

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/app
      MINIO_ENDPOINT: minio:9000
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_prod_data:
  minio_prod_data:
  redis_prod_data:
